name: Package PBIP to PBIX

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Conversion job ID from the app
        required: true
        type: string
      pbip_package_url:
        description: URL to powerbi_project_package.zip
        required: true
        type: string
      callback_url:
        description: Optional API callback URL for job status updates
        required: false
        type: string
      callback_token:
        description: Optional callback bearer token
        required: false
        type: string

jobs:
  package-pbix:
    runs-on: windows-latest
    steps:
      - name: Create workspace
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path work | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null
          New-Item -ItemType Directory -Force -Path tools | Out-Null

      - name: Install pbi-tools Core
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/pbi-tools/pbi-tools/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "pbi-tools\.core\..*_win-x64\.zip" } | Select-Object -First 1
          if (-not $asset) { throw "Could not find pbi-tools Core win-x64 release asset" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "tools\pbi-tools-core.zip"
          Expand-Archive -Path "tools\pbi-tools-core.zip" -DestinationPath "tools\pbi-tools" -Force
          $exe = Get-ChildItem -Path "tools\pbi-tools" -Recurse -Filter "pbi-tools.core.exe" | Select-Object -First 1
          if (-not $exe) { throw "pbi-tools.core.exe not found after extraction" }
          "pbi_tools_path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $exe info

      - name: Download PBIP package
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ inputs.pbip_package_url }}" -OutFile "work\powerbi_project_package.zip"
          Expand-Archive -Path "work\powerbi_project_package.zip" -DestinationPath "work\project" -Force

      - name: Locate PBIP
        id: locate
        shell: pwsh
        run: |
          $pbip = Get-ChildItem -Path "work\project" -Recurse -Filter "*.pbip" | Select-Object -First 1
          if (-not $pbip) { throw "No .pbip file found in package" }
          "pbip_path=$($pbip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "report_name=$($pbip.BaseName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Compile PBIP to PBIX with pbi-tools
        id: compile_pbix
        shell: pwsh
        continue-on-error: true
        run: |
          $pbipPath = "${{ steps.locate.outputs.pbip_path }}"
          $pbipFolder = Split-Path -Parent $pbipPath
          $outputPath = Join-Path (Resolve-Path "out") "${{ steps.locate.outputs.report_name }}.pbix"
          & $env:pbi_tools_path compile $pbipFolder $outputPath PBIX true
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            "created=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit $exitCode
          }
          if (-not (Test-Path $outputPath)) { throw "pbi-tools completed but did not create $outputPath" }
          "created=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "pbix_path=$outputPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Compile PBIP to PBIT fallback with pbi-tools
        id: compile_pbit
        if: ${{ steps.compile_pbix.outputs.created != 'true' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $pbipPath = "${{ steps.locate.outputs.pbip_path }}"
          $pbipFolder = Split-Path -Parent $pbipPath
          $outputPath = Join-Path (Resolve-Path "out") "${{ steps.locate.outputs.report_name }}.pbit"
          & $env:pbi_tools_path compile $pbipFolder $outputPath PBIT true
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            "created=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit $exitCode
          }
          if (-not (Test-Path $outputPath)) { throw "pbi-tools completed but did not create $outputPath" }
          "created=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "pbit_path=$outputPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Capture PBIP source and packaging note
        if: always()
        shell: pwsh
        run: |
          Compress-Archive -Path "work\project\*" -DestinationPath "out\${{ steps.locate.outputs.report_name }}-pbip-source.zip" -Force
          $pbixCreated = "${{ steps.compile_pbix.outputs.created }}" -eq "true"
          $pbitCreated = "${{ steps.compile_pbit.outputs.created }}" -eq "true"
          if ($pbixCreated) {
            $noteLines = @(
              "pbi-tools produced a PBIX artifact successfully.",
              "",
              "Job ID: ${{ inputs.job_id }}",
              "PBIP: ${{ steps.locate.outputs.pbip_path }}",
              "Workflow run: ${{ github.run_id }}"
            )
          } elseif ($pbitCreated) {
            $noteLines = @(
              "pbi-tools did not emit a PBIX, but produced a PBIT fallback artifact successfully.",
              "",
              "Job ID: ${{ inputs.job_id }}",
              "PBIP: ${{ steps.locate.outputs.pbip_path }}",
              "Workflow run: ${{ github.run_id }}",
              "",
              "pbi-tools supports PBIX output mainly for report-only/thin report projects. This generated project includes a semantic model, so PBIT is the supported pbi-tools packaging fallback.",
              "Open the PBIT in Power BI Desktop, provide credentials if prompted, refresh, and save as PBIX."
            )
          } else {
            $noteLines = @(
              "pbi-tools could not compile this generated PBIP into PBIX or PBIT.",
              "",
              "Job ID: ${{ inputs.job_id }}",
              "PBIP: ${{ steps.locate.outputs.pbip_path }}",
              "Workflow run: ${{ github.run_id }}",
              "",
              "The extracted PBIP source is included for debugging. Consider Power BI Desktop automation, Fabric/Power BI REST packaging, or a self-hosted Windows runner."
            )
          }
          $noteLines | Out-File -FilePath "out\PBIX_PACKAGING_NOTE.txt" -Encoding utf8

      - name: Upload packaged artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pbix-worker-${{ inputs.job_id }}
          path: out/*
          retention-days: 7

      - name: Callback status
        if: ${{ always() && inputs.callback_url != '' }}
        shell: pwsh
        run: |
          $headers = @{}
          if ("${{ inputs.callback_token }}" -ne "") {
            $headers["Authorization"] = "Bearer ${{ inputs.callback_token }}"
          }
          $pbixCreated = "${{ steps.compile_pbix.outputs.created }}" -eq "true"
          $pbitCreated = "${{ steps.compile_pbit.outputs.created }}" -eq "true"
          $status = if ($pbixCreated) { "worker-complete" } elseif ($pbitCreated) { "worker-pbit-fallback" } else { "worker-failed" }
          $note = if ($pbixCreated) { "pbi-tools produced a PBIX artifact." } elseif ($pbitCreated) { "pbi-tools produced a PBIT fallback artifact; PBIX was not emitted for this semantic-model project." } else { "pbi-tools did not emit PBIX or PBIT. See PBIX_PACKAGING_NOTE.txt and workflow logs." }
          $body = @{
            jobId = "${{ inputs.job_id }}"
            status = $status
            artifactName = "pbix-worker-${{ inputs.job_id }}"
            runId = "${{ github.run_id }}"
            pbixCreated = $pbixCreated
            pbitCreated = $pbitCreated
            note = $note
          } | ConvertTo-Json
          Invoke-RestMethod -Method Post -Uri "${{ inputs.callback_url }}" -Headers $headers -Body $body -ContentType "application/json"

      - name: Fail if no package artifact was created
        if: ${{ steps.compile_pbix.outputs.created != 'true' && steps.compile_pbit.outputs.created != 'true' }}
        shell: pwsh
        run: |
          throw "pbi-tools did not emit PBIX or PBIT. See PBIX_PACKAGING_NOTE.txt and workflow logs."

name: Package PBIP to PBIX

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Conversion job ID from the app
        required: true
        type: string
      pbip_package_url:
        description: URL to powerbi_project_package.zip
        required: true
        type: string
      callback_url:
        description: Optional API callback URL for job status updates
        required: false
        type: string
      callback_token:
        description: Optional callback bearer token
        required: false
        type: string

jobs:
  package-pbix:
    runs-on: windows-latest
    steps:
      - name: Create workspace
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path work | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null

      - name: Download PBIP package
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ inputs.pbip_package_url }}" -OutFile "work\powerbi_project_package.zip"
          Expand-Archive -Path "work\powerbi_project_package.zip" -DestinationPath "work\project" -Force

      - name: Locate PBIP
        id: locate
        shell: pwsh
        run: |
          $pbip = Get-ChildItem -Path "work\project" -Recurse -Filter "*.pbip" | Select-Object -First 1
          if (-not $pbip) { throw "No .pbip file found in package" }
          "pbip_path=$($pbip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "report_name=$($pbip.BaseName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package PBIX placeholder
        shell: pwsh
        run: |
          # This step is the integration seam for a real Windows Power BI packager.
          # Replace this placeholder with your licensed packaging command, for example:
          #   pbi-tools compile "${{ steps.locate.outputs.pbip_path }}" -format PBIX -outPath "out"
          # or a Power BI Desktop/Fabric automation step.
          $readme = @"
          PBIX packaging worker reached GitHub Actions successfully.

          Job ID: ${{ inputs.job_id }}
          PBIP: ${{ steps.locate.outputs.pbip_path }}

          This artifact is a placeholder because no licensed PBIX packaging command is configured in the workflow yet.
          Install/configure pbi-tools, Power BI Desktop automation, or Fabric export in this step to emit a native .pbix.
          "@
          $readme | Out-File -FilePath "out\PBIX_PACKAGING_PLACEHOLDER.txt" -Encoding utf8
          Compress-Archive -Path "work\project\*" -DestinationPath "out\${{ steps.locate.outputs.report_name }}-pbip-source.zip" -Force

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbix-worker-${{ inputs.job_id }}
          path: out/*
          retention-days: 7

      - name: Callback status
        if: ${{ inputs.callback_url != '' }}
        shell: pwsh
        run: |
          $headers = @{}
          if ("${{ inputs.callback_token }}" -ne "") {
            $headers["Authorization"] = "Bearer ${{ inputs.callback_token }}"
          }
          $body = @{
            jobId = "${{ inputs.job_id }}"
            status = "worker-complete"
            artifactName = "pbix-worker-${{ inputs.job_id }}"
            runId = "${{ github.run_id }}"
            note = "GitHub Actions worker completed. Configure packaging step to emit native PBIX."
          } | ConvertTo-Json
          Invoke-RestMethod -Method Post -Uri "${{ inputs.callback_url }}" -Headers $headers -Body $body -ContentType "application/json"
